name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: TypeScript check
        run: npm run check:ts

      - name: Build derived indexes
        run: npm run build:indexes

      - name: Check IDs
        run: npm run check:ids

      - name: Astro build
        run: npm run build
